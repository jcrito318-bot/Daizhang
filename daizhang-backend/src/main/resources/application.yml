server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: daizhang-backend

  # 数据源配置 - H2 嵌入式数据库（本地文件存储，无需安装数据库服务）
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: org.h2.Driver
    # 数据库文件存储在程序运行目录下的 data/daizhang.mv.db
    url: jdbc:h2:file:./data/daizhang;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;AUTO_SERVER=TRUE
    username: sa
    password:
    druid:
      initial-size: 2
      min-idle: 2
      max-active: 10
      max-wait: 60000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false

  # H2 控制台
  # B-020 修复:默认关闭,防止生产环境暴露数据库控制台(/h2-console 可直接操作数据)。
  # 开发环境请通过环境变量 H2_CONSOLE_ENABLED=true 启用。
  h2:
    console:
      enabled: ${H2_CONSOLE_ENABLED:false}
      path: /h2-console
      settings:
        # 仅允许本机访问，防止远程未授权访问数据库控制台
        web-allow-others: false

  # SQL 初始化 - 已由 Flyway 接管 (P3.1)
  # 原有 schema-h2.sql / data-h2.sql 保留作为参考,但不再由 Spring SQL init 执行
  # Flyway 迁移文件位于 classpath:db/migration/V*.sql
  sql:
    init:
      mode: never

  # Flyway 数据库迁移配置 (P3.1)
  # - baseline-on-migrate: 已有数据库(无 flyway_schema_history 表)自动基线化,不报错
  # - baseline-version: 基线版本号,0 表示从 V1 开始全部执行(空库场景)
  # - validate-on-migrate: 宽松模式,允许已有 schema 与迁移文件不完全一致
  # - out-of-order: 严格按版本号顺序执行,不允许乱序
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    validate-on-migrate: false
    out-of-order: false

  # Jackson配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    serialization:
      write-dates-as-timestamps: false

  # Servlet配置
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 100MB

# MyBatis Plus配置
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.company.daizhang.module.*.entity
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: true
    lazy-loading-enabled: true
    multiple-result-sets-enabled: true
    use-column-label: true
    use-generated-keys: true
    default-executor-type: simple
    default-statement-timeout: 25000
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT配置
# 不再提供弱默认值:未设置环境变量 JWT_SECRET 时此处为空,启动时 validateSecret 会直接拒绝启动
jwt:
  secret: ${JWT_SECRET:}
  # 单位：秒。JwtUtils 中 expiration*1000 转毫秒，7200秒=2小时
  expiration: 7200
  refresh-expiration: 604800  # 7天(秒)

# Token 黑名单实现配置(BV-06 修复)
# - memory: 默认,基于 ConcurrentHashMap,适用于单实例部署(本项目默认)
# - redis: 集群部署适用,跨实例共享黑名单,需引入 spring-boot-starter-data-redis 依赖
#           详见 RedisTokenBlacklist 类注释
app:
  token-blacklist:
    type: ${TOKEN_BLACKLIST_TYPE:memory}
  cookie:
    # BF-02 修复:refresh token Cookie 配置
    # max-age:与 refresh token 的 JWT 过期时间一致(默认 7 天 = 604800 秒)
    refresh-token-max-age: ${REFRESH_TOKEN_COOKIE_MAX_AGE:604800}
    # secure:生产环境(HTTPS)应设为 true,本地开发(http)可设为 false
    # 浏览器对 localhost 会豁免 Secure,但显式关闭可避免开发环境的 Cookie 丢失问题
    secure: ${COOKIE_SECURE:false}
  # 数据备份配置 (P3.3)
  backup:
    # 备份文件存储目录
    directory: ${BACKUP_DIR:./backups}
    # 是否启用定时自动备份
    auto-enabled: ${BACKUP_AUTO_ENABLED:true}
    # 定时备份 cron 表达式(默认每日凌晨 2 点)
    cron: ${BACKUP_CRON:0 0 2 * * ?}
    # 最多保留的备份份数(超出则清理最旧的)
    max-keep: ${BACKUP_MAX_KEEP:30}
  # P4.1 敏感字段 AES-GCM 加密配置
  # secret-key:32 字节(256 位)的 base64 编码密钥,必须通过环境变量 CRYPTO_SECRET_KEY 注入
  # 启动时若 enabled=true 且 secret-key 为空,启动失败
  # 生成命令:openssl rand -base64 32
  crypto:
    enabled: ${CRYPTO_ENABLED:true}
    secret-key: ${CRYPTO_SECRET_KEY:}
  # P4.2 / P4.3 安全策略配置
  security:
    # 2FA 临时 token 有效期(秒),仅用于登录后 2FA 验证阶段
    two-factor-temp-token-expiration: 300
    # 登录锁定阈值(连续失败次数)
    login-fail-threshold: ${LOGIN_FAIL_THRESHOLD:5}
    # 锁定时长(分钟)
    lock-duration-minutes: ${LOCK_DURATION_MINUTES:15}
    # 密码过期天数(超过则强制改密,0 表示不强制)
    password-expire-days: ${PASSWORD_EXPIRE_DAYS:90}
    # 密码历史校验深度(不能与最近 N 次密码相同)
    password-history-depth: ${PASSWORD_HISTORY_DEPTH:5}

# Knife4j配置
# B-021 修复:默认关闭,生产环境不暴露 API 文档。
# 开发环境请通过环境变量 KNIFE4J_ENABLED=true 或激活 dev profile 启用。
knife4j:
  enable: ${KNIFE4J_ENABLED:false}
  setting:
    language: zh_cn

# AI配置（GLM大模型）
ai:
  glm:
    enabled: true
    api-key: ${GLM_API_KEY:your-api-key-here}
    api-secret: ${GLM_API_SECRET:your-api-secret-here}
    base-url: https://open.bigmodel.cn/api/paas/v4
    ocr-model: glm-4v
    chat-model: glm-4-flash
    timeout: 30

# 文件上传存储路径（本地硬盘）
file:
  upload-path: ./data/uploads/

# 会计业务参数(B-015:从硬编码迁出,便于按行业/客户调整)
accounting:
  carry-forward-cost:
    # 成本结转默认成本率(0-1之间),仅当客户端未传 costRate 时使用
    default-rate: ${CARRY_FORWARD_COST_RATE:0.80}

# 日志配置
logging:
  level:
    com.company.daizhang: info
    com.company.daizhang.module.*.mapper: warn
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n'
  file:
    name: ./data/logs/daizhang.log
