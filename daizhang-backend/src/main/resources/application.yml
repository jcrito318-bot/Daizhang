server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: daizhang-backend

  # 数据源配置 - H2 嵌入式数据库（本地文件存储，无需安装数据库服务）
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: org.h2.Driver
    # 数据库文件存储在程序运行目录下的 data/daizhang.mv.db
    url: jdbc:h2:file:./data/daizhang;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;AUTO_SERVER=TRUE
    username: sa
    password:
    druid:
      initial-size: 2
      min-idle: 2
      max-active: 10
      max-wait: 60000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false

  # H2 控制台（开发调试用，生产可关闭）
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true

  # SQL 初始化 - 启动时自动创建表结构
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema-h2.sql
      data-locations: classpath:db/data-h2.sql
      continue-on-error: true

  # Jackson配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    serialization:
      write-dates-as-timestamps: false

  # Servlet配置
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 100MB

# MyBatis Plus配置
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.company.daizhang.module.*.entity
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: true
    lazy-loading-enabled: true
    multiple-result-sets-enabled: true
    use-column-label: true
    use-generated-keys: true
    default-executor-type: simple
    default-statement-timeout: 25000
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT配置
jwt:
  secret: daizhang-system-secret-key-2026-must-be-at-least-256-bits-long
  expiration: 7200000  # 2小时
  refresh-expiration: 604800000  # 7天

# Knife4j配置
knife4j:
  enable: true
  setting:
    language: zh_cn

# AI配置（GLM大模型）
ai:
  glm:
    enabled: true
    api-key: ${GLM_API_KEY:your-api-key-here}
    api-secret: ${GLM_API_SECRET:your-api-secret-here}
    base-url: https://open.bigmodel.cn/api/paas/v4
    ocr-model: glm-4v
    chat-model: glm-4-flash
    timeout: 30

# 文件上传存储路径（本地硬盘）
file:
  upload-path: ./data/uploads/

# 日志配置
logging:
  level:
    com.company.daizhang: info
    com.company.daizhang.module.*.mapper: warn
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n'
  file:
    name: ./data/logs/daizhang.log
