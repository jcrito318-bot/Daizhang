# ============================================
# 代账系统 Docker Compose 编排
# ============================================
# 一键启动: JWT_SECRET=your_32_byte_secret docker compose up -d
# 访问:
#   - 前端: http://localhost
#   - 后端: http://localhost:8080/api/
# 数据持久化: docker volume backend-data (H2 文件数据库 + 上传文件)
# ============================================

version: '3.8'

services:
  backend:
    build: ./daizhang-backend
    container_name: daizhang-backend
    ports:
      - "8080:8080"
    environment:
      # JWT 密钥 (必须设置,至少 32 字节;未设置时应用拒绝启动)
      - JWT_SECRET=${JWT_SECRET:-change_me_to_a_32_byte_random_secret}
      # Cookie Secure 标志 (HTTPS 环境设为 true,HTTP 设为 false)
      - COOKIE_SECURE=${COOKIE_SECURE:-false}
      # Token 黑名单实现 (memory=单实例, redis=集群)
      - TOKEN_BLACKLIST_TYPE=memory
      # H2 文件数据库 (存储在 volume 中,持久化)
      - SPRING_DATASOURCE_URL=jdbc:h2:file:/data/daizhang;MODE=MySQL;AUTO_SERVER=TRUE
      - SPRING_DATASOURCE_USERNAME=sa
      - SPRING_DATASOURCE_PASSWORD=
    volumes:
      - backend-data:/data
    restart: unless-stopped

  frontend:
    build: ./daizhang-frontend
    container_name: daizhang-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend-data:
    driver: local
